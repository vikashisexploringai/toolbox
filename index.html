<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Toolbox - Office Utilities</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📑</text></svg>">
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <header class="header">
            <h1>📑 Toolbox</h1>
            <p class="subtitle">Frequently used tools in your office</p>
            <span class="badge">🔒 100% Client-Side</span>
        </header>

        <!-- ===== TOOL GRID ===== -->
        <div class="tool-grid" id="toolGrid">
            <!-- Cards will be rendered by JavaScript -->
        </div>

        <!-- ===== FOOTER ===== -->
        <footer class="footer">
            Made with <span>❤️</span> · All processing done locally in your browser
        </footer>
    </div>

    <!-- ===== MODAL OVERLAY ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="icon" id="modalIcon">📑</span>
                    <span id="modalTitle">PDF Tool</span>
                </div>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Tool content will be injected here -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Footer buttons will be injected here -->
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
